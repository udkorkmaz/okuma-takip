<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Okuma Takip" />
<title>Okuma Takip</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #f5f2ee;
    --surface: #ffffff;
    --border: #e0dbd4;
    --text: #1a1714;
    --muted: #7a746e;
    --accent: #2d5a3d;
    --accent-light: #e8f0ea;
    --accent-mid: #4a8c5c;
    --warn: #c45a1a;
    --warn-light: #fdf0e8;
    --danger-light: #fcecea;
    --danger: #b03030;
    --info-light: #e8eef8;
    --info: #2a4a8a;
    --radius: 14px;
    --radius-sm: 8px;
  }
  body {
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .container { max-width: 430px; margin: 0 auto; padding: 20px 16px 40px; }
  h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 4px; }
  h2 { font-size: 16px; font-weight: 600; margin-bottom: 14px; }
  .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 14px; }
  .label { font-size: 12px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }
  input[type=number], input[type=date] {
    width: 100%; padding: 12px 14px; border: 1px solid var(--border);
    border-radius: var(--radius-sm); font-size: 16px; background: var(--bg);
    color: var(--text); outline: none; font-family: inherit; -webkit-appearance: none;
  }
  input[type=number]:focus, input[type=date]:focus { border-color: var(--accent-mid); }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .field { margin-bottom: 12px; }
  button {
    display: block; width: 100%; padding: 14px;
    background: var(--accent); color: #fff; border: none;
    border-radius: var(--radius-sm); font-size: 16px; font-weight: 600;
    font-family: inherit; cursor: pointer; transition: opacity 0.15s;
  }
  button:active { opacity: 0.8; }

  .metrics { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .metric { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 10px; text-align: center; }
  .metric .val { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; color: var(--text); }
  .metric .val.done { font-size: 28px; color: var(--accent-mid); }
  .metric .lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .progress-bg { background: var(--bg); border-radius: 99px; height: 8px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 99px; background: var(--accent-mid); transition: width 0.5s ease; }
  .progress-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-top: 5px; }

  .deficit-bar {
    background: var(--danger-light); border: 1px solid #f0b8b8;
    border-radius: var(--radius-sm); padding: 10px 14px;
    font-size: 13px; color: var(--danger); margin-bottom: 14px; line-height: 1.5;
  }
  .deficit-bar strong { color: var(--danger); }

  .today-info { font-size: 14px; color: var(--muted); margin-bottom: 12px; line-height: 1.5; }
  .today-info strong { color: var(--text); }
  .goal-note { background: var(--accent-light); border-radius: var(--radius-sm); padding: 10px 13px; font-size: 13px; color: var(--accent); margin-bottom: 12px; line-height: 1.5; }
  .warn-msg { font-size: 13px; color: var(--warn); margin-top: 8px; display: none; }

  .celebration { background: var(--accent-light); border: 1px solid #b5d4be; border-radius: var(--radius); padding: 18px; text-align: center; margin-bottom: 14px; display: none; }
  .cel-icon { font-size: 32px; margin-bottom: 6px; }
  .cel-msg { font-size: 16px; font-weight: 600; color: var(--accent); }
  .cel-sub { font-size: 13px; color: var(--accent-mid); margin-top: 4px; }

  .log-entry { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; gap: 8px; }
  .log-entry:last-child { border-bottom: none; }
  .log-date { color: var(--muted); font-size: 13px; white-space: nowrap; }
  .log-pages { font-weight: 500; }
  .badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 99px; white-space: nowrap; }
  .badge-ok { background: var(--accent-light); color: var(--accent); }
  .badge-great { background: var(--info-light); color: var(--info); }
  .badge-miss { background: var(--danger-light); color: var(--danger); }
  .badge-skip { background: #f5f2ee; color: var(--muted); border: 1px solid var(--border); }

  .dateclock { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; padding: 0 2px; }
  .dateclock .dc-date { font-size: 15px; font-weight: 600; color: var(--text); }
  .dateclock .dc-time { font-size: 15px; color: var(--muted); font-variant-numeric: tabular-nums; }

  .log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .reset-link { background: none; border: none; color: var(--muted); font-size: 13px; text-decoration: underline; cursor: pointer; width: auto; padding: 0; display: inline; }
  .empty-log { font-size: 13px; color: var(--muted); }
  #tracker-section { display: none; }
</style>
</head>
<body>
<div class="container">

  <div id="setup-section">
    <h1>📖 Okuma Takip</h1>
    <p class="subtitle">Her gün kazanılması gereken bir savaş.</p>
    <div class="card">
      <h2>Kitabını tanıt</h2>
      <div class="grid2">
        <div class="field">
          <div class="label">Toplam sayfa</div>
          <input type="number" id="total-pages" placeholder="300" min="1" inputmode="numeric" />
        </div>
        <div class="field">
          <div class="label">Günlük hedef</div>
          <input type="number" id="daily-goal" placeholder="10" min="1" inputmode="numeric" />
        </div>
      </div>
      <div class="field">
        <div class="label">Başlangıç sayfası (varsa)</div>
        <input type="number" id="start-page" placeholder="0" min="0" inputmode="numeric" />
      </div>
      <button onclick="setupBook()">Başla</button>
    </div>
  </div>

  <div id="tracker-section">

    <div class="dateclock">
      <span class="dc-date" id="clock-date"></span>
      <span class="dc-time" id="clock-time"></span>
    </div>

    <div id="deficit-banner" class="deficit-bar" style="display:none;"></div>

    <div class="metrics">
      <div class="metric"><div class="val" id="m-current">—</div><div class="lbl">sayfadasın</div></div>
      <div class="metric"><div class="val" id="m-target">—</div><div class="lbl">bugün bitiş</div></div>
      <div class="metric"><div class="val" id="m-left">—</div><div class="lbl">kalan sayfa</div></div>
    </div>

    <div class="card">
      <div class="label">İlerleme</div>
      <div class="progress-bg"><div class="progress-fill" id="book-bar" style="width:0%"></div></div>
      <div class="progress-row"><span id="pb-read">0 sayfa okundu</span><span id="pb-pct">0%</span></div>
    </div>

    <div class="celebration" id="celebration">
      <div class="cel-icon">🎉</div>
      <div class="cel-msg" id="cel-msg"></div>
      <div class="cel-sub" id="cel-sub"></div>
    </div>

    <div class="card">
      <h2>Bugün hangi sayfadasın?</h2>
      <div class="today-info" id="today-info"></div>
      <div class="goal-note" id="goal-note" style="display:none;"></div>
      <input type="number" id="page-input" placeholder="Sayfa numarasını gir..." inputmode="numeric" style="margin-bottom:10px;" />
      <button onclick="logPage()">Kaydet</button>
      <div class="warn-msg" id="warn-msg"></div>
      <div id="sync-status" style="font-size:12px; color:var(--muted); margin-top:8px; display:none;"></div>
    </div>

    <div class="card">
      <div class="log-header">
        <h2 style="margin:0;">Geçmiş</h2>
        <button class="reset-link" onclick="resetAll()">Sıfırla</button>
      </div>
      <div id="day-log"><div class="empty-log">Henüz kayıt yok.</div></div>
    </div>

  </div>
</div>

<script>
// ── TEST MODU: 1 saat = 1 periyot ──────────────────────────────────────────
// Gerçek moda geçmek için getPeriodKey içindeki 'h' satırını kaldır,
// periodsBetween'de 3600000 → 86400000 yap, periodRange'de +1h → +1gün yap.
// ───────────────────────────────────────────────────────────────────────────

let state = { totalPages:0, dailyGoal:0, currentPage:0, baseStartPage:0, startPeriod:'', log:[] };

function save() { localStorage.setItem('okuma_takip_v3', JSON.stringify(state)); }
function load() {
  try { const s = localStorage.getItem('okuma_takip_v3'); if (s) state = JSON.parse(s); } catch(e) {}
}

// Periyot anahtarı: YYYY-MM-DD-HH (test: saatlik)
function getPeriodKey(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth()+1).padStart(2,'0');
  const d = String(date.getDate()).padStart(2,'0');
  const h = String(date.getHours()).padStart(2,'0');
  return `${y}-${m}-${d}-${h}`;
}

function getDate() { return getPeriodKey(new Date()); }

function keyToDate(k) {
  const [y,m,d,h] = k.split('-').map(Number);
  return new Date(y, m-1, d, h);
}

function periodsBetween(k1, k2) {
  return Math.floor((keyToDate(k2) - keyToDate(k1)) / 3600000);
}

function periodRange(from, to) {
  const keys = [];
  let cur = keyToDate(from);
  const end = keyToDate(to);
  while (cur <= end) {
    keys.push(getPeriodKey(cur));
    cur = new Date(cur.getTime() + 3600000);
  }
  return keys;
}

function formatPeriodLabel(k) {
  const [y,m,d,h] = k.split('-').map(Number);
  const date = new Date(y, m-1, d, h);
  return date.toLocaleDateString('tr-TR', {day:'numeric', month:'short'}) + ' ' +
    String(h).padStart(2,'0') + ':00';
}

function setupBook() {
  const total = parseInt(document.getElementById('total-pages').value);
  const goal = parseInt(document.getElementById('daily-goal').value);
  const start = parseInt(document.getElementById('start-page').value) || 0;
  if (!total || !goal || total < 1 || goal < 1) { alert('Toplam sayfa ve günlük hedefi doldur.'); return; }
  if (start >= total) { alert('Başlangıç sayfası toplam sayfadan küçük olmalı.'); return; }
  const now = getPeriodKey(new Date());
  state = { totalPages:total, dailyGoal:goal, currentPage:start, baseStartPage:start, startPeriod:now, log:[] };
  save();
  document.getElementById('setup-section').style.display = 'none';
  document.getElementById('tracker-section').style.display = 'block';
  render();
}

const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbx1u5E28NTSSoF8CgOyjEWonDW8KEaGDTA1WcICm2epDx3xugxtXpp9XfoxFhxuYQt1/exec';

function syncToSheets(entry) {
  const statusEl = document.getElementById('sync-status');
  statusEl.textContent = '↑ Sheets\'e gönderiliyor...';
  statusEl.style.display = 'block';
  statusEl.style.color = 'var(--muted)';
  const endPage = Math.min(entry.dayStartPage + state.dailyGoal - 1, state.totalPages);
  fetch(SHEETS_URL, {
    method: 'POST', mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      date: entry.date, dayStartPage: entry.dayStartPage,
      endPage, currentPage: entry.page,
      pagesRead: entry.pagesRead, hitGoal: entry.hitGoal, exceeded: entry.exceeded
    })
  }).then(() => {
    statusEl.textContent = '✓ Sheets\'e kaydedildi';
    statusEl.style.color = 'var(--accent)';
    setTimeout(() => { statusEl.style.display = 'none'; }, 4000);
  }).catch(() => {
    statusEl.textContent = '⚠ Sheets\'e gönderilemedi';
    statusEl.style.color = 'var(--warn)';
  });
}

function logPage() {
  const input = parseInt(document.getElementById('page-input').value);
  const warn = document.getElementById('warn-msg');
  warn.style.display = 'none';
  const date = getDate();
  if (!input || input < 1) { warn.textContent = 'Geçerli bir sayfa numarası gir.'; warn.style.display = 'block'; return; }
  if (input > state.totalPages) { warn.textContent = `Kitap ${state.totalPages} sayfa.`; warn.style.display = 'block'; return; }
  if (input <= state.currentPage) { warn.textContent = `Şu an ${state.currentPage}. sayfadasın. Daha ileri bir sayfa gir.`; warn.style.display = 'block'; return; }

  const existing = state.log.find(e => e.date === date);
  const dayStartPage = existing ? existing.dayStartPage : state.currentPage;
  const todayTarget = Math.min(dayStartPage + state.dailyGoal, state.totalPages);
  const pagesRead = input - dayStartPage;
  const hitGoal = input >= todayTarget;
  const exceeded = input > todayTarget;

  if (existing) {
    existing.page = input; existing.pagesRead = pagesRead;
    existing.hitGoal = hitGoal; existing.exceeded = exceeded;
  } else {
    state.log.push({ date, page:input, dayStartPage, todayTarget, pagesRead, hitGoal, exceeded });
  }
  state.currentPage = input;
  document.getElementById('page-input').value = '';
  save();
  syncToSheets(state.log.find(e => e.date === date));
  if (hitGoal) celebrate(exceeded);
  render();
}

function celebrate(exceeded) {
  const el = document.getElementById('celebration');
  document.getElementById('cel-msg').textContent = exceeded ? 'Müthiş! Hedefin çok üzerinde.' : 'Periyot hedefine ulaştın!';
  document.getElementById('cel-sub').textContent = 'Harika — bir sonraki periyotta yeniden savaş başlıyor.';
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 7000);
}

function calcDeficit(curPeriod) {
  if (!state.startPeriod) return 0;
  const elapsed = periodsBetween(state.startPeriod, curPeriod);
  if (elapsed <= 0) return 0;
  const expected = state.baseStartPage + (elapsed * state.dailyGoal);
  return Math.max(0, expected - state.currentPage);
}

function getMissedPeriods(curPeriod) {
  if (!state.startPeriod) return [];
  const all = periodRange(state.startPeriod, curPeriod);
  all.pop(); // exclude current
  const logged = new Set(state.log.map(e => e.date));
  return all.filter(p => !logged.has(p));
}

function render() {
  const date = getDate();
  const entry = state.log.find(e => e.date === date);
  const dayStartPage = entry ? entry.dayStartPage : state.currentPage;
  const endPage = Math.min(dayStartPage + state.dailyGoal - 1, state.totalPages);
  const todayTarget = Math.min(dayStartPage + state.dailyGoal, state.totalPages);
  const left = state.totalPages - state.currentPage;
  const pct = Math.round(state.currentPage / state.totalPages * 100);

  // Deficit
  const deficit = calcDeficit(date);
  const deficitBanner = document.getElementById('deficit-banner');
  if (deficit > 0) {
    const missed = getMissedPeriods(date).length;
    deficitBanner.innerHTML = `Plandan <strong>${deficit} sayfa</strong> geride kaldın (${missed} periyot atlandı).`;
    deficitBanner.style.display = 'block';
  } else {
    deficitBanner.style.display = 'none';
  }

  // Metrics
  document.getElementById('m-current').textContent = state.currentPage + '.';
  const targetEl = document.getElementById('m-target');
  if (entry && entry.hitGoal) {
    targetEl.textContent = '✓';
    targetEl.className = 'val done';
  } else {
    targetEl.textContent = endPage + '.';
    targetEl.className = 'val';
  }
  document.getElementById('m-left').textContent = left;

  document.getElementById('book-bar').style.width = pct + '%';
  document.getElementById('pb-read').textContent = state.currentPage + ' sayfa okundu';
  document.getElementById('pb-pct').textContent = pct + '%';

  document.getElementById('today-info').innerHTML =
    `Başlangıç: <strong>${dayStartPage}. sayfa</strong> → Bitir: <strong>${endPage}. sayfa</strong>`;

  const noteEl = document.getElementById('goal-note');
  if (entry && entry.hitGoal) {
    const extra = entry.pagesRead - state.dailyGoal;
    noteEl.textContent = `Hedefe ulaştın — ${entry.pagesRead} sayfa okudun${extra > 0 ? ` (${extra} fazla)` : ''}. Devam edebilirsin.`;
    noteEl.style.display = 'block';
  } else {
    noteEl.style.display = 'none';
  }

  // Log
  const logEl = document.getElementById('day-log');
  const missed = getMissedPeriods(date);
  const allEntries = [
    ...state.log.map(e => ({ ...e, missed: false })),
    ...missed.map(p => ({ date: p, missed: true, pagesRead: 0 }))
  ].sort((a,b) => b.date.localeCompare(a.date));

  if (!allEntries.length) {
    logEl.innerHTML = '<div class="empty-log">Henüz kayıt yok.</div>';
  } else {
    logEl.innerHTML = allEntries.map(e => {
      const lbl = formatPeriodLabel(e.date);
      if (e.missed) {
        return `<div class="log-entry"><span class="log-date">${lbl}</span><span style="color:var(--muted);font-size:13px;">atlandı</span><span class="badge badge-skip">Atlandı</span></div>`;
      }
      const badge = e.exceeded
        ? '<span class="badge badge-great">Harika</span>'
        : e.hitGoal
        ? '<span class="badge badge-ok">Tamam</span>'
        : '<span class="badge badge-miss">Eksik</span>';
      return `<div class="log-entry"><span class="log-date">${lbl}</span><span class="log-pages">${e.pagesRead} sayfa</span>${badge}</div>`;
    }).join('');
  }
}

function resetAll() {
  if (!confirm('Tüm verileri silmek istiyor musun?')) return;
  localStorage.removeItem('okuma_takip_v3');
  state = { totalPages:0, dailyGoal:0, currentPage:0, baseStartPage:0, startPeriod:'', log:[] };
  document.getElementById('setup-section').style.display = 'block';
  document.getElementById('tracker-section').style.display = 'none';
}

function updateClock() {
  const now = new Date();
  const dateEl = document.getElementById('clock-date');
  const timeEl = document.getElementById('clock-time');
  if (!dateEl || !timeEl) return;
  dateEl.textContent = now.toLocaleDateString('tr-TR', { weekday:'long', day:'numeric', month:'long' });
  timeEl.textContent = now.toLocaleTimeString('tr-TR', { hour:'2-digit', minute:'2-digit' });
}

// Saat başı periyot geçişini yakala
let lastPeriod = getPeriodKey(new Date());
setInterval(() => {
  const cur = getPeriodKey(new Date());
  if (cur !== lastPeriod) { lastPeriod = cur; if (state.totalPages > 0) render(); }
}, 10000); // her 10 saniyede kontrol

setInterval(updateClock, 1000);
updateClock();

document.addEventListener('visibilitychange', () => { if (!document.hidden && state.totalPages > 0) render(); });
window.addEventListener('focus', () => { if (state.totalPages > 0) render(); });

load();
if (state.totalPages > 0) {
  document.getElementById('setup-section').style.display = 'none';
  document.getElementById('tracker-section').style.display = 'block';
  render();
}
</script>
</body>
</html>
